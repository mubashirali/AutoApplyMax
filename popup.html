<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoApplyMax</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>AutoApplyMax</h1>
        <span class="version">v2.3</span>
    </div>

    <!-- Main Action Button -->
    <div class="actions">
        <button id="start-autofill-btn" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14.2929 2.29289C14.6834 1.90237 15.3166 1.90237 15.7071 2.29289L21.7071 8.29289C22.0976 8.68342 22.0976 9.31658 21.7071 9.70711L11.7071 19.7071C11.5196 19.8946 11.2652 20 11 20H4C3.44772 20 3 19.5523 3 19V12C3 11.7348 3.10536 11.4804 3.29289 11.2929L14.2929 2.29289Z" stroke="currentColor" stroke-width="2"/><path d="M13 4L19 10" stroke="currentColor" stroke-width="2"/></svg>
            Start Autofill
        </button>
    </div>

    <!-- Tabs for Settings and Data -->
    <div class="tabs">
        <button class="tab active" data-tab="settings">Settings</button>
        <button class="tab" data-tab="personal">Personal</button>
        <button class="tab" data-tab="eeo">EEO</button>
        <button class="tab" data-tab="history">History</button>
    </div>

    <!-- Settings Tab -->
    <div id="settings-tab" class="tab-content active">
        <div class="form-group">
            <label>Autofill Engine</label>
            <select id="parser-type">
                <option value="local">Local Heuristic (Free, Private)</option>
                <option value="ai">AI Enhanced (Requires API Key)</option>
            </select>
        </div>
        <div id="ai-settings" style="display: none;">
            <div class="form-group">
                <label>AI Provider URL</label>
                <input type="text" id="aiProviderUrl" placeholder="https://openrouter.ai/api/v1/chat/completions">
                <small style="color:#888;font-size:11px;">OpenRouter: openrouter.ai/api/v1/chat/completions &nbsp;|&nbsp; DeepSeek: api.deepseek.com/chat/completions</small>
            </div>
            <div class="form-group">
                <label>Model</label>
                <input type="text" id="aiModel" placeholder="deepseek/deepseek-chat">
                <small style="color:#888;font-size:11px;">OpenRouter: deepseek/deepseek-chat, openai/gpt-4o-mini &nbsp;|&nbsp; DeepSeek: deepseek-chat</small>
            </div>
            <div class="form-group"><label>AI API Key</label><input type="password" id="aiApiKey"></div>
        </div>
    </div>

    <!-- Personal Info Tab -->
    <div id="personal-tab" class="tab-content">
        <div class="form-row">
            <div class="form-group"><label>First Name</label><input type="text" id="firstName"></div>
            <div class="form-group"><label>Last Name</label><input type="text" id="lastName"></div>
        </div>
        <div class="form-group"><label>Email</label><input type="email" id="email"></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="phone"></div>
        <div class="form-group"><label>Address</label><input type="text" id="addressLine1"></div>
        <div class="form-row">
            <div class="form-group"><label>City</label><input type="text" id="city"></div>
            <div class="form-group"><label>Postal Code</label><input type="text" id="postalCode"></div>
        </div>
        <div class="form-group"><label>Country</label><input type="text" id="country"></div>
        <div class="form-group"><label>Skills (comma-separated)</label><textarea id="skills" rows="3"></textarea></div>
    </div>

    <!-- EEO Tab -->
    <div id="eeo-tab" class="tab-content">
        <div class="form-group"><label>Gender</label><input type="text" id="gender"></div>
        <div class="form-group"><label>Race/Ethnicity</label><input type="text" id="race"></div>
        <div class="form-group"><label>Veteran Status</label><input type="text" id="veteranStatus"></div>
        <div class="form-group"><label>Disability Status</label><input type="text" id="disabilityStatus"></div>
        <div class="form-group"><label>Pronouns</label><input type="text" id="pronouns"></div>
    </div>

    <!-- History Tab (Read-only) -->
    <div id="history-tab" class="tab-content">
        <h4>Work History</h4>
        <div id="work-history-list" class="history-list"></div>
        <h4>Education</h4>
        <div id="education-history-list" class="history-list"></div>
    </div>

</div>
<script src="popup-improvements.js"></script>
<script src="popup.js"></script>
</body>
</html>
